<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="p:domain_verify" content="aa664de7480cdb801dd52bd92865874c"/>
  <title>{% if page.title %}{{ page.title | escape }} {% else %}Wanjaaro — Free Personal Finance Calculators{% endif %}</title>
  
  {% if page.description %}
    <meta name="description" content="{{ page.description | escape }}">
  {% else %}
    <meta name="description" content="Free, browser-based position size calculators for Forex, Stocks, Crypto, Options, and Futures. No signup, no server uploads — your data stays local.">
  {% endif %}

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  
  <!-- Favicon placeholder -->
  <link rel="icon" href="/assets/img/favicon/wanjaaro.ico" type="image/x-icon">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}Wanjaaro — Trading Calculators{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}Free browser-based position size calculators for traders. No signup required.{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
<meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{% assign og_slug = page.name | remove: '.html' | remove: '.md' %}{{ '/assets/img/' | append: og_slug | append: '.webp' | absolute_url }}{% endif %}">  <meta property="og:image:type" content="image/webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}Wanjaaro — Trading Calculators{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description | escape }}{% else %}Free browser-based position size calculators for traders. No signup required.{% endif %}">
  <meta name="twitter:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{% assign og_slug = page.name | remove: '.html' | remove: '.md' %}{% assign og_image_path = '/assets/img/' | append: og_slug | append: '.webp' %}{{ og_image_path | absolute_url }}{% endif %}">
  <!-- Fonts: Georgia + system-ui (no external requests) -->
  <style>
    /* Preload system-ui fallback, no external fonts */
  </style>

  <!-- Global CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/tool.css">
  <script src="assets/js/data.js"></script>
  <!-- Ahrefs Analytics -->
   <script src="https://analytics.ahrefs.com/analytics.js" data-key="V4gUcl5Cbnx6QFjz2rjL2Q" async></script>
</head>
